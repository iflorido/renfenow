<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Renfe Realtime Dashboard | Automa Works</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>

    <style>
        /* Estilos base basados en Automa Works */
        body {
            background-color: #0f1d2e; 
            color: #ffffff; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            overflow: hidden; /* Para que el mapa ocupe todo sin scroll */
        }

        /* Navbar superior sencilla */
        .top-navbar {
            background-color: #0b1622;
            border-bottom: 1px solid #1f2d3d;
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 60px;
        }

        .brand-title {
            color: #4a90e2;
            font-weight: 700;
            font-size: 1.25rem;
            margin: 0;
        }

        /* Contenedor del mapa */
        #map-container {
            position: relative;
            height: calc(100vh - 60px);
            width: 100%;
        }
        #map { height: 100%; width: 100%; z-index: 1; }

        /* --- SISTEMA DE PANELES APILADOS --- */
        .map-overlays {
            position: absolute;
            top: 15px;
            right: 15px;
            width: 320px; 
            z-index: 1000; 
            display: flex;
            flex-direction: column;
            gap: 15px; 
            pointer-events: none; 
        }

        /* Estilo base de cada panel (Oscuro) */
        .map-panel {
            background-color: #162438;
            border: 1px solid #233652;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.4);
            overflow: hidden;
            pointer-events: auto; 
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            color: #e0e0e0;
        }

        /* Cabeceras Clickables */
        .panel-header {
            padding: 12px 15px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: bold;
            user-select: none;
            border-bottom: 1px solid transparent;
        }

        /* El cuerpo del panel */
        .panel-body {
            max-height: 0; 
            overflow-y: auto;
            transition: max-height 0.4s ease-out;
            opacity: 0;
        }

        .map-panel.is-open .panel-body {
            max-height: 50vh; 
            opacity: 1;
            border-top: 1px solid #233652;
        }

        .toggle-icon { transition: transform 0.3s; }
        .map-panel.is-open .toggle-icon { transform: rotate(180deg); }

        /* Estilos específicos de paneles */
        #panel-avisos .panel-header { background: #dc3545; color: white; }
        #panel-avisos.hidden { display: none; }

        #panel-flota .panel-header { background-color: #162438; color: #4a90e2; }
        
        /* Items internos de la lista */
        .list-group-item {
            background-color: transparent;
            color: #b0b8c4;
            border-bottom: 1px solid #233652;
        }
        .list-group-item:hover {
            background-color: #1f2d3d;
            color: #ffffff;
        }
        /* NUEVO: Máscara para colorear el SVG externo */
        .icono-estacion-svg {
            background-color: #bbd4f0; /* El azul de tu tema */
            mask: url('/static/images/estacion.svg') no-repeat center / contain;
            -webkit-mask: url('/static/images/estacion.svg') no-repeat center / contain;
            width: 16px;
            height: 16px;
            /* Si quieres que brille un poco como los trenes, puedes descomentar la siguiente línea: */
            /* filter: drop-shadow(0 0 3px rgba(74, 144, 226, 0.6)); */
        }

        /* Fix para el mapa Leaflet en modo oscuro */
        .leaflet-container { background: #0f1d2e; }
        
        @media (max-width: 768px) {
            .map-overlays { width: calc(100% - 30px); left: 15px; right: 15px; }
        }
    </style>
</head>
<body>

    <div class="top-navbar">
        <h1 class="brand-title"><i class="fas fa-train me-2"></i> Renfe Realtime Dashboard</h1>
        <small class="text-muted">Desarrollado por Automa Works</small>
    </div>

    <div id="map-container">
        
        <div id="loading-overlay" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; background-color: #0f1d2e; z-index: 9999; display: flex; flex-direction: column; justify-content: center; align-items: center; transition: opacity 0.5s;">
            <i class="fas fa-train fa-4x fa-bounce mb-3" style="color: #4a90e2;"></i>
            <h3 style="color: #4a90e2; font-weight: bold;">Conectando con Renfe...</h3>
            <p class="text-secondary">Descargando y cruzando posiciones en tiempo real</p>
        </div>

        <div class="map-overlays">
            
            <div id="panel-avisos" class="map-panel is-open">
                <div class="panel-header" onclick="togglePanel('panel-avisos')">
                    <span><i class="fas fa-exclamation-triangle me-2"></i> ALERTAS RENFE</span>
                    <i class="fas fa-chevron-down toggle-icon"></i>
                </div>
                <div class="panel-body">
                    <div id="lista-avisos" class="p-2">
                        </div>
                </div>
            </div>

            <div id="panel-flota" class="map-panel is-open"> 
                <div class="panel-header" onclick="togglePanel('panel-flota')">
                    <span><i class="fas fa-route me-2"></i> Trenes Activos</span>
                    <i class="fas fa-chevron-down toggle-icon"></i>
                </div>
                <div class="panel-body">
                    <div id="lista-vehiculos" class="list-group list-group-flush">
                        </div>
                </div>
            </div>
            <div id="panel-estaciones" class="map-panel"> <div class="panel-header" onclick="togglePanel('panel-estaciones')">
                    <span><i class="fas fa-building me-2"></i> Buscar Estaciones</span>
                    <i class="fas fa-chevron-down toggle-icon text-muted"></i>
                </div>
                <div class="panel-body">
                    <div class="p-2 border-bottom" style="background-color: #1f2d3d; border-color: #233652 !important;">
                        <input type="text" id="buscador-estaciones" class="form-control form-control-sm mb-2" placeholder="🔍 Buscar por nombre (ej. Puerto)..." style="background-color: #0b1622; color: #fff; border: 1px solid #233652;">
                        <select id="filtro-provincia" class="form-select form-select-sm" style="background-color: #0b1622; color: #fff; border: 1px solid #233652;">
                            <option value="">Todas las provincias...</option>
                            </select>
                    </div>
                    <div id="lista-estaciones" class="list-group list-group-flush" style="max-height: 35vh; overflow-y: auto;">
                        <div class="p-3 text-center text-muted" style="font-size: 0.85rem;">
                            <i class="fas fa-search fs-4 mb-2"></i><br>
                            Utiliza el buscador o selecciona una provincia para ver estaciones.
                        </div>
                    </div>
                </div>
            </div>

        </div>

        <div id="map"></div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // Lógica de UI (Acordeón)
        function togglePanel(id) {
            const panel = document.getElementById(id);
            panel.classList.toggle('is-open');
        }

        // Configuración inicial del mapa
        var map = L.map('map', {zoomControl: false}).setView([40.4168, -3.7038], 6);
        L.control.zoom({position: 'topleft'}).addTo(map);

        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; OpenStreetMap contributors &copy; CARTO',
            subdomains: 'abcd',
            maxZoom: 20
        }).addTo(map);

        var layerEstaciones = L.layerGroup().addTo(map);

        // --- LÓGICA DE VEHÍCULOS ---
       // --- LÓGICA DE VEHÍCULOS Y MAPA ---
        var marcadores = {}; 
        window.lineasActivas = {}; 

        function crearIcono(color) {
            const htmlIcon = `<div style="background-color: ${color}; width: 14px; height: 14px; border-radius: 50%; border: 2px solid #0f1d2e; box-shadow: 0 0 8px ${color}; transition: background-color 0.3s;"></div>`;
            return L.divIcon({className: 'custom-pin', html: htmlIcon, iconSize: [14, 14]});
        }

        // 1. CARGA INICIAL SINCRONIZADA (TRENES + ALERTAS)
        // 1. CARGA INICIAL SINCRONIZADA CON REINTENTOS
        async function inicializarDashboard(intentos = 0) {
            try {
                const loader = document.getElementById('loading-overlay');
                const loaderText = loader.querySelector('p');
                loader.style.display = 'flex';

                if (intentos > 0) {
                    loaderText.innerText = `Renfe está tardando, reintentando conexión (Intento ${intentos + 1})...`;
                } else {
                    loaderText.innerText = "Descargando y cruzando posiciones en tiempo real...";
                }

                // Esperamos ambas descargas simultáneamente
                const [resVehiculos, resAlertas] = await Promise.all([
                    fetch('/api/vehiculos'),
                    fetch('/api/alerts')
                ]);

                if (!resVehiculos.ok || !resAlertas.ok) throw new Error("Fallo en la petición HTTP");

                const trenes = await resVehiculos.json();
                
                // --- NUEVO: SISTEMA DE REINTENTO FRONTEND ---
                // Si la API no devuelve trenes (fallo de Renfe) y no hemos superado 4 intentos
                if (trenes.length === 0 && intentos < 4) {
                    console.warn(`Intento ${intentos + 1}: 0 trenes recibidos. Reintentando en 2.5s...`);
                    setTimeout(() => inicializarDashboard(intentos + 1), 2500);
                    return; // Abortamos la ejecución actual y esperamos al siguiente intento
                }
                // ---------------------------------------------

                const alertasHTML = await resAlertas.text();

                // 1. Inyectamos HTML alertas
                document.getElementById('lista-avisos').innerHTML = alertasHTML;

                // 2. Dibujamos trenes
                procesarTrenes(trenes);

                // 3. Cruzamos datos
                vincularAlertasYTrenes();
                // 4. Cargamos estaciones (no bloqueante, pero lo hacemos aquí para que se vea antes el mapa con trenes)
                await cargarEstaciones();

                // 4. Ocultamos el loader suavemente
                loader.style.opacity = '0';
                setTimeout(() => loader.style.display = 'none', 500);

                // 5. Arrancamos los ciclos de actualización en segundo plano
                setInterval(actualizarTrenesFondo, 20000); 
                setInterval(actualizarAlertasFondo, 60000); 

            } catch (error) {
                console.error("❌ Error en la carga inicial:", error);
                
                // Si falla incluso después de reintentar, permitimos entrar al mapa
                if (intentos < 4) {
                    setTimeout(() => inicializarDashboard(intentos + 1), 2500);
                } else {
                    document.getElementById('loading-overlay').innerHTML = `
                        <i class="fas fa-plug fa-4x mb-3" style="color: #dc3545;"></i>
                        <h3 style="color: #dc3545;">Servidores de Renfe saturados</h3>
                        <p class="text-secondary">No hemos podido obtener los trenes. Pulsa F5 para recargar.</p>
                        <button class="btn btn-outline-primary mt-3" onclick="location.reload()">Recargar Página</button>
                    `;
                }
            }
        }

        // 2. PROCESADO DE TRENES EN EL MAPA Y LISTA
        function procesarTrenes(trenes) {
            const listaDiv = document.getElementById('lista-vehiculos');
            listaDiv.innerHTML = ''; 
            window.lineasActivas = {}; 

            if (trenes.length === 0) {
                listaDiv.innerHTML = '<div class="p-3 text-center text-warning">No hay trenes reportando posición.</div>';
                return;
            }

            trenes.forEach(tren => {
                if (!window.lineasActivas[tren.linea_unica]) window.lineasActivas[tren.linea_unica] = [];
                window.lineasActivas[tren.linea_unica].push(tren);

                if (marcadores[tren.id]) {
                    marcadores[tren.id].setLatLng([tren.lat, tren.lon]);
                } else {
                    const marker = L.marker([tren.lat, tren.lon], {icon: crearIcono('#4a90e2')}).addTo(map);
                    // AÑADIDO: La provincia en el popup normal
                    marker.bindPopup(`<div style="color: #333;">
                        <strong style="color:#4a90e2; font-size:1.1rem;">Línea ${tren.linea}</strong> <span class="text-muted" style="font-size:0.85rem;">(${tren.provincia})</span><br>
                        <small>${tren.nombre}</small>
                    </div>`);
                    marcadores[tren.id] = marker;
                }

                const item = document.createElement('div');
                item.className = 'list-group-item p-2 border-0 border-bottom';
                item.style.cursor = 'pointer';
                item.style.backgroundColor = 'transparent';
                
                item.onclick = function() {
                    map.setView([tren.lat, tren.lon], 14); 
                    marcadores[tren.id].openPopup();
                    if(window.innerWidth < 768) togglePanel('panel-flota');
                };

                // AÑADIDO: Un "badge" o etiqueta con la provincia al lado del nombre de la línea en el panel lateral
                item.innerHTML = `
                    <div class="d-flex align-items-center">
                        <span style="color:#4a90e2; font-size:1.2rem; margin-right:12px;"><i class="fas fa-train"></i></span>
                        <div class="flex-grow-1">
                            <div class="fw-bold" style="color: #e0e0e0; font-size: 0.95rem;">
                                Línea ${tren.linea} <span class="badge bg-secondary ms-1" style="font-size: 0.65rem; vertical-align: middle;">${tren.provincia}</span>
                            </div>
                            <div class="text-secondary" style="font-size: 0.8rem;">${tren.nombre}</div>
                        </div>
                        <i class="fas fa-crosshairs text-muted" style="font-size: 0.85rem;"></i>
                    </div>`;
                listaDiv.appendChild(item);
            });
        }
        // --- LÓGICA DE ESTACIONES ---
        window.todasLasEstaciones = []; // Guardamos todas las estaciones en memoria
        window.marcadoresEstaciones = {}; // Guardamos los marcadores para poder abrir sus popups

        async function cargarEstaciones() {
            try {
                const res = await fetch('/api/estaciones');
                if (!res.ok) throw new Error("Error al descargar estaciones");
                const estaciones = await res.json();
                
                window.todasLasEstaciones = estaciones;
                let provinciasSet = new Set(); // Para guardar provincias únicas sin repetir

                estaciones.forEach(est => {
                    // Si tiene provincia, la añadimos al set
                    if (est.provincia) provinciasSet.add(est.provincia);

                    //const iconHtml = `<div style="background-color: #233652; width: 8px; height: 8px; border: 1px solid #4a90e2; border-radius: 2px;"></div>`;
                    //const icon = L.divIcon({className: 'station-pin', html: iconHtml, iconSize: [8, 8]});
                    
                    // Usamos el div con la máscara CSS que colorea tu SVG
                    const iconHtml = `<div class="icono-estacion-svg"></div>`;
                    // Centramos el icono (iconAnchor: [8, 8] es la mitad de 16x16)
                    const icon = L.divIcon({className: 'station-pin', html: iconHtml, iconSize: [32, 32], iconAnchor: [16, 16]});

                    const marker = L.marker([est.lat, est.lon], {icon: icon, zIndexOffset: -100}); 
                    marker.bindPopup(`
                        <div style="color: #333; min-width: 200px;">
                            <strong style="color: #162438; font-size:1.1rem;">
                                <i class="fas fa-building me-1 text-secondary"></i> ${est.nombre}
                            </strong><br>
                            <hr style="margin: 5px 0;">
                            <small class="text-muted"><i class="fas fa-map-marker-alt me-1"></i> ${est.direccion}, ${est.cp}</small><br>
                            <small><strong>${est.poblacion}</strong> (${est.provincia})</small>
                        </div>
                    `);
                    
                    layerEstaciones.addLayer(marker);
                    window.marcadoresEstaciones[est.codigo] = marker; // Guardamos el marcador usando su código
                });
                
                // Llenar el desplegable de provincias alfabéticamente
                const selectProv = document.getElementById('filtro-provincia');
                let provinciasArray = Array.from(provinciasSet).sort();
                provinciasArray.forEach(prov => {
                    let option = document.createElement('option');
                    option.value = prov;
                    option.innerText = prov;
                    selectProv.appendChild(option);
                });

                // Activar los eventos de búsqueda
                document.getElementById('buscador-estaciones').addEventListener('input', filtrarEstaciones);
                document.getElementById('filtro-provincia').addEventListener('change', filtrarEstaciones);

            } catch (error) {
                console.error("❌ Error cargando estaciones:", error);
            }
        }

        // Función que se ejecuta cada vez que escribes o cambias la provincia
        function filtrarEstaciones() {
            const textoBusqueda = document.getElementById('buscador-estaciones').value.toLowerCase();
            const provinciaSelec = document.getElementById('filtro-provincia').value;
            const listaDiv = document.getElementById('lista-estaciones');
            
            // Si está todo vacío, no mostramos nada para no saturar
            if (textoBusqueda === '' && provinciaSelec === '') {
                listaDiv.innerHTML = `
                    <div class="p-3 text-center text-muted" style="font-size: 0.85rem;">
                        <i class="fas fa-search fs-4 mb-2"></i><br>
                        Utiliza el buscador o selecciona una provincia para ver estaciones.
                    </div>`;
                return;
            }

            // Filtrar las estaciones
            let filtradas = window.todasLasEstaciones.filter(est => {
                const cumpleTexto = est.nombre.toLowerCase().includes(textoBusqueda);
                const cumpleProvincia = provinciaSelec === '' || est.provincia === provinciaSelec;
                return cumpleTexto && cumpleProvincia;
            });

            listaDiv.innerHTML = '';

            if (filtradas.length === 0) {
                listaDiv.innerHTML = '<div class="p-3 text-center text-warning" style="font-size: 0.85rem;">No se encontraron estaciones con esos datos.</div>';
                return;
            }

            // Para no bloquear la web si buscan "a", limitamos la lista visual a las 50 primeras
            const MAX_RESULTADOS = 50;
            const resultados = filtradas.slice(0, MAX_RESULTADOS);

            resultados.forEach(est => {
                const item = document.createElement('div');
                item.className = 'list-group-item p-2 border-0 border-bottom';
                item.style.cursor = 'pointer';
                item.style.backgroundColor = 'transparent';
                
                // Al hacer clic, viajamos a la estación y abrimos su Popup
                item.onclick = function() {
                    map.setView([est.lat, est.lon], 16); // Nivel de zoom muy cercano
                    if(window.marcadoresEstaciones[est.codigo]) {
                        window.marcadoresEstaciones[est.codigo].openPopup();
                    }
                    if(window.innerWidth < 768) togglePanel('panel-estaciones');
                };

                item.innerHTML = `
                    <div class="d-flex align-items-center">
                        <span style="color:#b0b8c4; font-size:1.1rem; margin-right:12px;"><i class="fas fa-building"></i></span>
                        <div class="flex-grow-1">
                            <div class="fw-bold" style="color: #e0e0e0; font-size: 0.9rem;">${est.nombre}</div>
                            <div class="text-secondary" style="font-size: 0.75rem;">${est.poblacion} (${est.provincia})</div>
                        </div>
                        <i class="fas fa-map-marker-alt text-muted" style="font-size: 0.8rem;"></i>
                    </div>
                `;
                listaDiv.appendChild(item);
            });

            // Avisar si hay más resultados que no se muestran
            if (filtradas.length > MAX_RESULTADOS) {
                const msj = document.createElement('div');
                msj.className = 'p-2 text-center text-muted';
                msj.style.fontSize = '0.75rem';
                msj.innerText = `Mostrando ${MAX_RESULTADOS} de ${filtradas.length} resultados. Usa el buscador para afinar.`;
                listaDiv.appendChild(msj);
            }
        }
        // 3. CRUCE DE DATOS
        function vincularAlertasYTrenes() {
            const alertas = document.querySelectorAll('.alerta-item');
            let lineasConAlerta = {}; 
            
            alertas.forEach(alerta => {
                const lineasStr = alerta.getAttribute('data-lineas');
                if (!lineasStr) return;
                
                const titulo = alerta.querySelector('strong').innerText;
                const desc = alerta.querySelector('.text-secondary').innerText;
                const lineasAfectadas = lineasStr.split(',');
                
                lineasAfectadas.forEach(linea => {
                    const lineaLimpia = linea.trim(); 
                    if (!lineasConAlerta[lineaLimpia]) lineasConAlerta[lineaLimpia] = [];
                    lineasConAlerta[lineaLimpia].push({titulo, desc, elementoDOM: alerta});
                });
            });

            let trenesPorAlertaHTML = new Map(); 

            Object.keys(window.lineasActivas).forEach(lineaActiva => {
                const trenesDeEstaLinea = window.lineasActivas[lineaActiva];
                let alertasParaEstaLinea = [];

                Object.keys(lineasConAlerta).forEach(lineaAfectada => {
                    if (lineaActiva === lineaAfectada) {
                        alertasParaEstaLinea = alertasParaEstaLinea.concat(lineasConAlerta[lineaAfectada]);
                    }
                });

                trenesDeEstaLinea.forEach(tren => {
                    const marker = marcadores[tren.id];
                    if (!marker) return;

                    if (alertasParaEstaLinea.length > 0) {
                        marker.setIcon(crearIcono('#dc3545'));
                        let popupHTML = `<div style="color: #333; max-width: 260px;">
                            <strong style="color:#dc3545; font-size:1.1rem;">Línea ${tren.linea}</strong> <span class="text-muted" style="font-size:0.85rem;">(${tren.provincia})</span><br>
                            <small class="text-muted">${tren.nombre}</small>
                            <hr style="margin: 8px 0; border-top: 1px solid #ddd;">`;
                        
                        let avisosMostrados = new Set();
                        alertasParaEstaLinea.forEach(al => {
                            if (!avisosMostrados.has(al.titulo)) {
                                popupHTML += `<div style="margin-bottom: 8px;">
                                    <strong style="color:#dc3545; font-size:0.85rem;"><i class="fas fa-exclamation-triangle"></i> ${al.titulo}</strong><br>
                                    <span style="font-size:0.8rem; line-height:1.2;">${al.desc}</span>
                                </div>`;
                                avisosMostrados.add(al.titulo);
                            }
                            if (!trenesPorAlertaHTML.has(al.elementoDOM)) {
                                trenesPorAlertaHTML.set(al.elementoDOM, []);
                            }
                            trenesPorAlertaHTML.get(al.elementoDOM).push(tren);
                        });
                        
                        popupHTML += `</div>`;
                        marker.bindPopup(popupHTML);

                    } else {
                        marker.setIcon(crearIcono('#4a90e2'));
                        marker.bindPopup(`
                            <div style="color: #333;">
                                <strong style="color:#4a90e2; font-size:1.1rem;">Línea ${tren.linea}</strong> <span class="text-muted" style="font-size:0.85rem;">(${tren.provincia})</span><br>
                                <small>${tren.nombre}</small>
                            </div>
                        `);
                    }
                });
            });

            alertas.forEach(alerta => {
                const icono = alerta.querySelector('.icono-alerta');
                const trenesAfectados = trenesPorAlertaHTML.get(alerta) || [];

                if (trenesAfectados.length > 0) {
                    alerta.style.borderLeftColor = '#dc3545';
                    alerta.style.cursor = 'pointer';
                    icono.style.color = '#dc3545';
                    
                    alerta.onclick = function() {
                        if (trenesAfectados.length === 1) {
                            map.setView([trenesAfectados[0].lat, trenesAfectados[0].lon], 14);
                        } else {
                            const bounds = L.latLngBounds(trenesAfectados.map(t => [t.lat, t.lon]));
                            map.fitBounds(bounds, {padding: [50, 50]});
                        }
                        marcadores[trenesAfectados[0].id].openPopup();
                        if(window.innerWidth < 768) togglePanel('panel-avisos');
                    };
                } else {
                    alerta.style.borderLeftColor = '#fd7e14';
                    alerta.style.cursor = 'default';
                    icono.style.color = '#fd7e14';
                    alerta.onclick = null;
                }
            });
        }

        // 4. FUNCIONES DE ACTUALIZACIÓN EN SEGUNDO PLANO
        async function actualizarTrenesFondo() {
            try {
                const res = await fetch('/api/vehiculos');
                if (res.ok) {
                    const trenes = await res.json();
                    procesarTrenes(trenes);
                    vincularAlertasYTrenes();
                }
            } catch (e) { console.error("Error trenes fondo", e); }
        }

        async function actualizarAlertasFondo() {
            try {
                const res = await fetch('/api/alerts');
                if (res.ok) {
                    const html = await res.text();
                    document.getElementById('lista-avisos').innerHTML = html;
                    vincularAlertasYTrenes();
                }
            } catch (e) { console.error("Error alertas fondo", e); }
        }

        // Arrancamos todo
        inicializarDashboard();
    </script>
